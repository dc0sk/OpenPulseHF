# Example OpenPulse runtime config.
# Typical location: ~/.config/openpulse/config.toml

[station]
callsign = "N0CALL"
grid_square = "AA00"

[audio]
backend = "default"
tx_limiter_threshold = 0.0

[modem]
mode = "BPSK250"
ptt_backend = "none"

[radio]
rigctld_addr = "127.0.0.1:4532"

[radio.rig_a]
rigctld_addr = "127.0.0.1:4532"
backend = "rigctld"
serial_port = ""
rig_file = ""

# Uncomment for cross-band repeater operation.
# [radio.rig_b]
# rigctld_addr = "127.0.0.1:4533"
# backend = "rigctld"
# serial_port = ""
# rig_file = ""

[repeater]
enabled = false
mode = "BPSK250"
tx_hang_ms = 500
full_duplex = false

[ardop]
bind_addr = "127.0.0.1"
cmd_port = 8515
data_port = 8516

[kiss]
bind_addr = "127.0.0.1"
port = 8100

[logging]
level = "info"
# Optional persistent log file (REQ-OBS-02): logs are also appended to a daily-rolled
# file (<path>.YYYY-MM-DD) in addition to stdout. `~` is expanded. Read by openpulse-daemon.
# RUST_LOG still overrides `level`.
# file = "~/.local/share/openpulse/openpulse.log"

[observability]
# Audit mode (REQ-OBS-01): when enabled, openpulse-daemon records its control-event stream
# to <archive_dir>/events.ndjson for later analysis. Off by default. `~` is expanded.
audit_mode = false
archive_dir = "~/.local/share/openpulse/audit"

[control_security]
# Control-channel PSK auth + encryption (REQ-SEC-CTL-01/02). Auth is ALWAYS required on a
# non-loopback daemon bind; `require_auth` forces it on loopback too. When auth is required the
# daemon refuses to start without a PSK (fail closed). The 32-byte PSK is currently supplied via the
# OPENPULSE_CONTROL_PSK env var (64 hex chars); keystore-backed loading under `psk_key_id` follows.
require_auth = false
psk_key_id = "control-psk"

[relay]
enabled = false
max_hops = 3
store_forward_ttl_s = 300
deny_list = []

[trust]
store_path = ""

[mesh]
enabled = false
max_hops = 3
relay_policy = "balanced"
store_forward_ttl_s = 300
beacon_interval_s = 60
peer_cache_capacity = 256
peer_cache_ttl_s = 3600

[qsy]
enabled = false
allow_trustlevels = ["verified", "psk_verified"]
bandplan_mode = "ham-iaru-r1"
bandplan_awareness_enabled = true
enforce_max_channel_width = true
enforce_segment_conventions = true
candidate_freqs_hz = [7074000, 7076000, 7104000]
scan_dwell_ms = 500
switchover_offset_s = 5

[daemon]
tcp_bind_addr = "127.0.0.1"
tcp_port = 9000
websocket_bind_addr = "127.0.0.1"
websocket_port = 9001
receive_tick_ms = 50
