<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenPulseHF TUI Session Start</title>
  <desc id="desc">Terminal screenshot showing openpulse session start command and JSON output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#172338" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="40" y="40" width="1200" height="640" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <rect x="40" y="40" width="1200" height="44" rx="16" fill="#1e293b" />
  <circle cx="66" cy="62" r="7" fill="#ef4444" />
  <circle cx="90" cy="62" r="7" fill="#f59e0b" />
  <circle cx="114" cy="62" r="7" fill="#22c55e" />
  <text x="640" y="68" fill="#cbd5e1" font-family="JetBrains Mono, Fira Code, monospace" font-size="16" text-anchor="middle">openpulse • session start</text>

  <text x="72" y="128" fill="#94a3b8" font-family="JetBrains Mono, Fira Code, monospace" font-size="22">$ OPENPULSE_CONFIG_DIR=/tmp/openpulse-demo openpulse --backend loopback session start --peer W2XYZ --format json</text>
  <text x="72" y="176" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">{</text>
  <text x="92" y="212" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">"status": "ok",</text>
  <text x="92" y="248" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">"reason_code": "verified_out_of_band",</text>
  <text x="92" y="284" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">"session_id": "sess-20260425-01",</text>
  <text x="92" y="320" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">"peer": "W2XYZ",</text>
  <text x="92" y="356" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">"hpx_state": "authenticating",</text>
  <text x="92" y="392" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">"transition_count": 3</text>
  <text x="72" y="428" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">}</text>

  <rect x="72" y="474" width="1140" height="174" rx="10" fill="#111827" stroke="#1f2937" />
  <text x="92" y="514" fill="#22d3ee" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">Tip:</text>
  <text x="150" y="514" fill="#cbd5e1" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">run openpulse session log --follow to watch persisted lifecycle entries.</text>
  <text x="92" y="552" fill="#22d3ee" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">Persistence:</text>
  <text x="216" y="552" fill="#cbd5e1" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">session-state.json + session-log.json are updated on start/resume/end.</text>
  <text x="92" y="590" fill="#22d3ee" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">Mode:</text>
  <text x="150" y="590" fill="#cbd5e1" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">loopback (deterministic).</text>
</svg>
