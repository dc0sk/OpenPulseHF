<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenPulseHF TUI Session Log Follow</title>
  <desc id="desc">Terminal screenshot showing session log follow output with lifecycle events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#091015" />
      <stop offset="100%" stop-color="#0d2530" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="44" y="52" width="1192" height="616" rx="12" fill="#06121b" stroke="#19404e" stroke-width="2" />
  <text x="74" y="108" fill="#99f6e4" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">$ openpulse session log --follow --follow-timeout-ms 3000 --poll-interval-ms 150 --format json</text>
  <text x="74" y="154" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{</text>
  <text x="96" y="188" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"status": "ok",</text>
  <text x="96" y="222" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"follow": true,</text>
  <text x="96" y="256" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"transition_count": 6,</text>
  <text x="96" y="290" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"transitions": [</text>
  <text x="122" y="324" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{"event":"session_start","reason_code":"verified_out_of_band"},</text>
  <text x="122" y="358" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{"event":"resume","reason_code":"session_snapshot_resumed"},</text>
  <text x="122" y="392" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{"event":"localcancel","reason_code":"session_ended"}</text>
  <text x="96" y="426" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">]</text>
  <text x="74" y="460" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">}</text>
  <rect x="74" y="500" width="1128" height="142" rx="10" fill="#10212c" stroke="#1f4b5a" />
  <text x="96" y="544" fill="#34d399" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">Follow window:</text>
  <text x="266" y="544" fill="#cbd5e1" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">bounded by timeout; no daemon required.</text>
  <text x="96" y="580" fill="#34d399" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">Source:</text>
  <text x="176" y="580" fill="#cbd5e1" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">persisted session-log.json updated by start/resume/end commands.</text>
</svg>
