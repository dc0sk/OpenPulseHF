<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenPulseHF TUI Session Diagnostics</title>
  <desc id="desc">Terminal screenshot showing session state diagnostics with pipeline metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101321" />
      <stop offset="100%" stop-color="#1d1f33" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="36" y="36" width="1208" height="648" rx="14" fill="#0b1020" stroke="#2b344b" stroke-width="2" />
  <text x="64" y="92" fill="#94a3b8" font-family="JetBrains Mono, Fira Code, monospace" font-size="21">$ openpulse session state --diagnostics --format json</text>
  <text x="64" y="136" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{</text>
  <text x="86" y="170" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"status": "ok",</text>
  <text x="86" y="204" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"hpx_state": "ready",</text>
  <text x="86" y="238" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"session_id": "sess-20260425-01",</text>
  <text x="86" y="272" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"pipeline_metrics": {</text>
  <text x="112" y="306" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"in_flight": 0,</text>
  <text x="112" y="340" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"max_in_flight": 32,</text>
  <text x="112" y="374" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"stages": [</text>
  <text x="138" y="408" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{"stage":"InputCapture","queued":0,"processed":8},</text>
  <text x="138" y="442" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{"stage":"DemodulateDecode","queued":0,"processed":8},</text>
  <text x="138" y="476" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">{"stage":"HpxStateUpdate","queued":0,"processed":8}</text>
  <text x="112" y="510" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">]</text>
  <text x="86" y="544" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">},</text>
  <text x="86" y="578" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">"transition_count": 5</text>
  <text x="64" y="612" fill="#e2e8f0" font-family="JetBrains Mono, Fira Code, monospace" font-size="20">}</text>
</svg>
