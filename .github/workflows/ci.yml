name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
  pull_request:
    branches:
      - main
      - develop
  # Also allow manual triggering via the Actions tab for convenience.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Linux: install ALSA development headers required by cpal.
      # PipeWire is supported via the PipeWire ALSA compatibility layer.
      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build (all features)
        run: cargo build --workspace

      # Run tests without the cpal backend so CI doesn't need audio hardware.
      - name: Test (no-audio-hardware)
        run: cargo test --workspace --no-default-features

      # Verify the project also compiles with all features enabled.
      - name: Check (all features)
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace --no-default-features -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all -- --check

  cross-aarch64-linux:
    name: Cross-check (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-aarch64-cargo-${{ hashFiles('**/Cargo.toml') }}

      # Use `cross` to handle cross-compilation without requiring native aarch64 toolchain.
      - name: Check workspace for aarch64 target
        run: cross check --workspace --target aarch64-unknown-linux-gnu --no-default-features

  pi5-smoke-loopback:
    name: Pi5 smoke profile (loopback)
    runs-on: ubuntu-latest

    env:
      OPENPULSE_PI_PROFILE: pi5-smoke

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Keep this profile hardware-independent: loopback backend + no default features.
      - name: Pi5 smoke tests (loopback only)
        run: cargo test --workspace --no-default-features

      - name: Pi5 benchmark smoke run
        run: cargo run -p openpulse-cli --no-default-features -- --backend loopback --log error benchmark run >/tmp/openpulse-benchmark.json

      - name: Verify benchmark JSON payload
        run: grep -q '"scenarios"' /tmp/openpulse-benchmark.json

      - name: Benchmark regression gate
        run: |
          PASSED=$(jq '.passed' /tmp/openpulse-benchmark.json)
          TOTAL=$(jq '.total' /tmp/openpulse-benchmark.json)
          MEAN_TRANSITIONS=$(jq '.mean_transitions' /tmp/openpulse-benchmark.json)
          
          echo "Benchmark Results: $PASSED/$TOTAL scenarios passed, mean_transitions=$MEAN_TRANSITIONS"
          
          # Check all scenarios passed (100% pass rate)
          if [ "$PASSED" -ne "$TOTAL" ]; then
            echo "❌ Regression: $((TOTAL - PASSED)) scenarios failed"
            exit 1
          fi
          
          # Check mean_transitions within policy (max 20.0 per scenario)
          if (( $(echo "$MEAN_TRANSITIONS > 20.0" | bc -l) )); then
            echo "❌ Regression: mean_transitions=$MEAN_TRANSITIONS exceeds policy (max 20.0)"
            exit 1
          fi
          
          echo "✅ Benchmark regression gate passed"
