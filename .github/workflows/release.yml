name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-x86-static:
    name: Build static x86-64 binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86-musl-${{ hashFiles('**/Cargo.toml', 'Cargo.lock') }}

      - name: Build binaries (static musl)
        run: |
          cargo build --release --locked \
            -p openpulse-ardop \
            -p openpulse-kiss \
            -p openpulse-daemon \
            --target x86_64-unknown-linux-musl \
            --no-default-features

      - name: Stage artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir dist
          cp target/x86_64-unknown-linux-musl/release/openpulse-tnc     "dist/openpulse-tnc_${TAG}_linux_x86_64_static"
          cp target/x86_64-unknown-linux-musl/release/openpulse-kisstnc "dist/openpulse-kisstnc_${TAG}_linux_x86_64_static"
          cp target/x86_64-unknown-linux-musl/release/openpulse-server  "dist/openpulse-server_${TAG}_linux_x86_64_static"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86-static
          path: dist/

  build-aarch64-deb:
    name: Build aarch64 .deb packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross and cargo-deb
        run: |
          cargo install cross --version 0.2.5 --locked
          cargo install cargo-deb --version 3.7.0 --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-deb-${{ hashFiles('**/Cargo.toml', 'Cargo.lock') }}

      - name: Cross-build (aarch64)
        run: |
          cross build --release --locked \
            -p openpulse-ardop \
            -p openpulse-kiss \
            -p openpulse-daemon \
            --target aarch64-unknown-linux-gnu \
            --no-default-features

      - name: Package .deb files (aarch64)
        run: |
          for pkg in openpulse-ardop openpulse-kiss openpulse-daemon; do
            cargo deb -p "$pkg" \
              --no-build \
              --target aarch64-unknown-linux-gnu
          done

      - name: Stage .deb artifacts
        run: |
          mkdir dist
          find target/aarch64-unknown-linux-gnu/debian -name '*.deb' -exec cp {} dist/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-deb
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build-x86-static, build-aarch64-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download x86 static binaries
        uses: actions/download-artifact@v4
        with:
          name: x86-static
          path: dist/

      - name: Download aarch64 .deb packages
        uses: actions/download-artifact@v4
        with:
          name: aarch64-deb
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
