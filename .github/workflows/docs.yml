name: Docs Checks

on:
  pull_request:

jobs:
  validate-doc-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docs frontmatter
        run: |
          chmod +x scripts/validate-doc-frontmatter.sh
          ./scripts/validate-doc-frontmatter.sh

  check-version-bump-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump companion files
        run: |
          chmod +x scripts/check-version-bump-docs.sh
          ./scripts/check-version-bump-docs.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

  validate-benchmark-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate benchmark artifacts
        run: |
          bash scripts/validate-benchmark-artifacts.sh

  check-benchmark-regressions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare benchmark aggregates against baselines
        run: |
          bash scripts/check-benchmark-regressions.sh benchmark/baselines benchmark/results/aggregate

  docs:
    runs-on: ubuntu-latest
    needs: [validate-doc-frontmatter, check-version-bump-docs, validate-benchmark-artifacts, check-benchmark-regressions]
    steps:
      - run: echo "All docs checks passed"
