[package]
name        = "psk8-plugin"
description = "8PSK modulation/demodulation plugin for OpenPulse"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true

[features]
gpu = ["dep:openpulse-gpu"]

[dependencies]
openpulse-core = { workspace = true }
openpulse-dsp  = { workspace = true }
num-complex    = { workspace = true }
openpulse-gpu  = { workspace = true, optional = true }

[dev-dependencies]
openpulse-channel = { workspace = true }
